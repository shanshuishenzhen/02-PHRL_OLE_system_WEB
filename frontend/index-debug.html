<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>职业技能等级认证考试系统 - 调试入口</title>
  <style>
    body {
      font-family: 'Microsoft YaHei', Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f5f7fa;
      color: #303133;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      flex-direction: column;
    }
    .container {
      width: 800px;
      background-color: white;
      border-radius: 5px;
      box-shadow: 0 2px 12px 0 rgba(0, 0, 0, 0.1);
      padding: 30px;
      margin-bottom: 20px;
    }
    .header {
      text-align: center;
      margin-bottom: 30px;
    }
    .header h1 {
      color: #409EFF;
      margin: 0;
      font-size: 28px;
    }
    .header p {
      color: #909399;
      margin-top: 10px;
      font-size: 16px;
    }
    .entry-list {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
    }
    .entry-card {
      background-color: #f5f7fa;
      border-radius: 5px;
      padding: 20px;
      text-align: center;
      transition: all 0.3s;
      cursor: pointer;
      text-decoration: none;
      color: #303133;
    }
    .entry-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 5px 15px 0 rgba(0, 0, 0, 0.1);
    }
    .entry-card h2 {
      color: #409EFF;
      margin-top: 0;
      margin-bottom: 10px;
      font-size: 20px;
    }
    .entry-card p {
      color: #606266;
      margin-bottom: 15px;
      font-size: 14px;
    }
    .entry-card .icon {
      font-size: 48px;
      margin-bottom: 15px;
      color: #409EFF;
    }
    .entry-card.primary {
      background-color: #ecf5ff;
      border: 1px solid #d9ecff;
    }
    .entry-card.success {
      background-color: #f0f9eb;
      border: 1px solid #e1f3d8;
    }
    .entry-card.success h2 {
      color: #67C23A;
    }
    .entry-card.success .icon {
      color: #67C23A;
    }
    .entry-card.warning {
      background-color: #fdf6ec;
      border: 1px solid #faecd8;
    }
    .entry-card.warning h2 {
      color: #E6A23C;
    }
    .entry-card.warning .icon {
      color: #E6A23C;
    }
    .entry-card.danger {
      background-color: #fef0f0;
      border: 1px solid #fde2e2;
    }
    .entry-card.danger h2 {
      color: #F56C6C;
    }
    .entry-card.danger .icon {
      color: #F56C6C;
    }
    .footer {
      text-align: center;
      margin-top: 20px;
      color: #909399;
      font-size: 14px;
    }
    .status-bar {
      background-color: #409EFF;
      color: white;
      padding: 10px;
      text-align: center;
      border-radius: 5px;
      margin-bottom: 20px;
      width: 800px;
    }
    .status-bar.error {
      background-color: #F56C6C;
    }
  </style>
</head>
<body>
  <div class="status-bar" id="status-bar">系统状态检查中...</div>
  
  <div class="container">
    <div class="header">
      <h1>职业技能等级认证考试系统</h1>
      <p>调试入口 - 请选择要访问的功能</p>
    </div>

    <div class="entry-list">
      <a href="login.html" class="entry-card primary">
        <div class="icon">👤</div>
        <h2>用户登录</h2>
        <p>进入系统登录页面，支持考生、教师和管理员角色</p>
      </a>

      <a href="debug-dashboard.html" class="entry-card success">
        <div class="icon">🔍</div>
        <h2>调试面板</h2>
        <p>访问系统调试面板，查看所有功能模块</p>
      </a>

      <a href="api-tester.html" class="entry-card warning">
        <div class="icon">🔧</div>
        <h2>API测试工具</h2>
        <p>测试系统API接口，发送请求并查看响应</p>
      </a>

      <a href="admin/" class="entry-card danger">
        <div class="icon">⚙️</div>
        <h2>Django管理后台</h2>
        <p>访问Django管理后台，直接管理数据库</p>
      </a>
    </div>
  </div>

  <div class="footer">
    <p>职业技能等级认证考试系统 &copy; 2023 - 调试版本</p>
  </div>

  <script>
    // 检查系统状态
    async function checkSystemStatus() {
      const statusBar = document.getElementById('status-bar');
      
      try {
        // 尝试访问后端API
        const response = await fetch('/api/gateway/status/', { 
          method: 'GET',
          headers: {
            'Accept': 'application/json'
          }
        });
        
        if (response.ok) {
          statusBar.textContent = '系统状态: 正常运行中';
          statusBar.classList.remove('error');
        } else {
          statusBar.textContent = `系统状态: 异常 (HTTP ${response.status})`;
          statusBar.classList.add('error');
        }
      } catch (error) {
        // 处理网络错误
        statusBar.textContent = '系统状态: 后端服务未启动或无法连接';
        statusBar.classList.add('error');
        console.error('系统状态检查失败:', error);
      }
    }

    // 页面加载时检查系统状态
    window.addEventListener('load', checkSystemStatus);

    // 添加调试模式快捷键
    document.addEventListener('keydown', function(event) {
      // Alt+D 组合键启用调试模式
      if (event.altKey && event.key === 'd') {
        window.location.href = 'login.html?debug=true';
      }
    });
  </script>
</body>
</html>
