<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>职业技能等级认证考试系统</title>
  <style>
    body {
      font-family: 'Microsoft YaHei', Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f5f7fa;
      color: #303133;
    }
    #app {
      min-height: 100vh;
    }
    .debug-entry {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background-color: rgba(255, 255, 255, 0.8);
      border-radius: 5px;
      padding: 10px;
      box-shadow: 0 2px 12px 0 rgba(0, 0, 0, 0.1);
      z-index: 9999;
      display: none;
    }
    .debug-entry.active {
      display: block;
    }
    .debug-entry a {
      display: block;
      margin: 5px 0;
      color: #409EFF;
      text-decoration: none;
    }
    .debug-entry a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/main.ts"></script>
  
  <!-- 调试入口 -->
  <div id="debugEntry" class="debug-entry">
    <a href="system-entry.html" target="_blank">系统入口</a>
    <a href="quick-login.html" target="_blank">快速登录</a>
    <a href="debug-dashboard.html" target="_blank">调试面板</a>
    <a href="api-tester.html" target="_blank">API测试工具</a>
  </div>

  <script>
    // 检测URL参数
    const urlParams = new URLSearchParams(window.location.search);
    const debug = urlParams.get('debug');
    
    // 如果有debug参数，显示调试入口
    if (debug === 'true') {
      document.getElementById('debugEntry').classList.add('active');
    }
    
    // 添加键盘快捷键
    document.addEventListener('keydown', function(e) {
      // Alt+D 显示/隐藏调试入口
      if (e.altKey && e.key === 'd') {
        const debugEntry = document.getElementById('debugEntry');
        debugEntry.classList.toggle('active');
      }
    });
  </script>
</body>
</html>
